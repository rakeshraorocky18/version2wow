version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: wow-postgres
    environment:
      POSTGRES_USER: wow_user
      POSTGRES_PASSWORD: wow_password
      POSTGRES_DB: wow_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wow_user -d wow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: wow-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j Graph DB (optional — powers graph-based recommendations)
  neo4j:
    image: neo4j:5-community
    container_name: wow-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/12345678
    volumes:
      - neo4j_data:/data

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: wow-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: wow_user
      POSTGRES_PASSWORD: wow_password
      POSTGRES_DB: wow_db
      MONGODB_URI: mongodb://mongodb:27017/wow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: wow-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: wow-refresh-secret-change-in-production
      SQLITE_DATABASE: /app/data/wow_dev.db
      # Prefer host Neo4j Desktop (wow_neo4j). Falls back to compose neo4j service if used.
      NEO4J_URI: bolt://host.docker.internal:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: 12345678
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Install deps from host package.json so neo4j-driver/nodemailer survive recreates
    command: sh -c "npm install && npm run start:dev"
    volumes:
      - ../backend/src:/app/src
      - ../backend/data:/app/data
      - ../backend/package.json:/app/package.json
      - backend_uploads:/app/uploads

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: wow-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    command: sh -c "rm -rf node_modules/.vite node_modules/.cache && npm install && npm run dev -- --host --force"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/src/index.css:/app/src/index.css
      - ../frontend/index.html:/app/index.html
      - ../frontend/vite.config.ts:/app/vite.config.ts
      - ../frontend/tailwind.config.js:/app/tailwind.config.js
      - ../frontend/postcss.config.js:/app/postcss.config.js
      - ../frontend/package.json:/app/package.json
      - ../frontend/package-lock.json:/app/package-lock.json

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  backend_uploads:
  neo4j_data:
